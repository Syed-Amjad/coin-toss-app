<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coin Toss Arena</title>

<style>
    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background:
            radial-gradient(circle at top left, rgba(255, 215, 0, 0.18), transparent 30%),
            radial-gradient(circle at bottom right, rgba(0, 255, 255, 0.12), transparent 30%),
            linear-gradient(135deg, #0f172a, #1e293b, #0b1120);
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .app-card {
        width: 100%;
        max-width: 760px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 28px;
        padding: 30px 24px;
        text-align: center;
    }

    .title {
        font-size: 36px;
        font-weight: 800;
    }

    .subtitle {
        margin-bottom: 20px;
        color: #dbeafe;
    }

    .players-section {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
        margin-bottom: 20px;
    }

    .player-box input {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: none;
        background: rgba(255,255,255,0.1);
        color: white;
    }

    .scoreboard {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
        margin-bottom: 20px;
    }

    .score-card {
        background: rgba(255,255,255,0.1);
        padding: 15px;
        border-radius: 18px;
    }

    .coin {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: radial-gradient(circle, gold, orange);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: auto;
        font-weight: bold;
        font-size: 24px;
        transition: transform 2s;
    }

    .coin.flipping {
        transform: rotateY(2160deg);
    }

    .buttons {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 15px;
    }

    .btn {
        padding: 14px;
        border-radius: 30px;
        border: none;
        cursor: pointer;
        width: 100%;
        max-width: 260px;
        font-weight: bold;
    }

    .btn-primary { background: gold; }
    .btn-secondary { background: gray; color: white; }

    .footer {
        position: fixed;
        bottom: 10px;
        right: 10px;
        font-size: 12px;
    }

    @media (max-width: 640px) {
        .players-section,
        .scoreboard {
            grid-template-columns: 1fr;
        }

        .buttons {
            flex-direction: column;
        }

        .btn {
            width: 100%;
        }
    }
</style>
</head>

<body>

<div class="app-card">
    <h1 class="title">Coin Toss Arena</h1>
    <p class="subtitle">Set player names, toss the coin, and decide who starts.</p>

    <!-- ✅ MULTIPLAYER SECTION (ADDED) -->
    <div style="margin-bottom:20px;">
        <button class="btn btn-secondary" onclick="createGame()">Create Game</button>

        <input id="gameCodeInput" placeholder="Enter Code"
               style="padding:10px;border-radius:10px;border:none;margin-top:10px;">

        <button class="btn btn-secondary" onclick="joinGame()">Join Game</button>

        <p id="gameCodeDisplay"></p>

        <div id="shareLinks" style="display:none;">
            <a id="whatsappShare" target="_blank">Share WhatsApp</a><br>
            <a id="smsShare" target="_blank">Share SMS</a><br>
            <a id="emailShare" target="_blank">Share Email</a>
        </div>
    </div>

<div class="players-section">
    <div class="player-box">
        <input type="text" id="player1" placeholder="Enter Player 1 Name" value="Player 1" />
    </div>
    <div class="player-box">
        <input type="text" id="player2" placeholder="Enter Player 2 Name" value="Player 2" />
    </div>
</div>

<div class="scoreboard">
    <div class="score-card">
        <div id="scoreName1">Player 1</div>
        <h1 id="score1">0</h1>
    </div>
    <div class="score-card">
        <div id="scoreName2">Player 2</div>
        <h1 id="score2">0</h1>
    </div>
</div>

<div id="coin" class="coin">TOSS</div>

<h2 id="resultText">Ready?</h2>
<p id="statusText">Best of 3 (first to 2 wins)</p>

<div class="buttons">
    <button class="btn btn-primary" id="tossBtn" onclick="tossCoin()">Click to toss</button>
    <button class="btn btn-secondary" onclick="resetGame()">Reset Game</button>
</div>

</div>

<div class="footer">Developed by Amjad</div>

<audio id="tossSound">
    <source src="/static/sound/toss.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
let scorePlayer1 = 0;
let scorePlayer2 = 0;
let gameOver = false;
let gameCode = null; // ✅ ADDED

const player1Input = document.getElementById('player1');
const player2Input = document.getElementById('player2');

function getPlayer1Name() {
    return player1Input.value.trim() || 'Player 1';
}

function getPlayer2Name() {
    return player2Input.value.trim() || 'Player 2';
}

function syncNames() {
    document.getElementById('scoreName1').textContent = getPlayer1Name();
    document.getElementById('scoreName2').textContent = getPlayer2Name();
}

function fireConfetti() {
    confetti({ particleCount: 150, spread: 90, origin: { y: 0.6 } });
}

function setGameWinner(name) {
    gameOver = true;
    document.getElementById('resultText').textContent = name + " wins the match 🎉";
    document.getElementById('statusText').textContent = "Game over";
    document.getElementById('tossBtn').disabled = true;
    fireConfetti();
}

function tossCoin() {
    if (gameOver) return;

    syncNames();

    const coin = document.getElementById('coin');
    coin.classList.add('flipping');
    document.getElementById('tossSound').play();

    const url = gameCode ? `/toss?code=${gameCode}` : '/toss';

    setTimeout(() => {
        fetch(url)
            .then(res => res.json())
            .then(data => {
                const result = data.result;

                if (result === 'Heads') {
                    scorePlayer1++;
                    coin.textContent = 'HEADS';
                    document.getElementById('resultText').textContent = getPlayer1Name() + " wins this round";
                } else {
                    scorePlayer2++;
                    coin.textContent = 'TAILS';
                    document.getElementById('resultText').textContent = getPlayer2Name() + " wins this round";
                }

                document.getElementById('score1').textContent = scorePlayer1;
                document.getElementById('score2').textContent = scorePlayer2;

                if (scorePlayer1 === 2) setGameWinner(getPlayer1Name());
                if (scorePlayer2 === 2) setGameWinner(getPlayer2Name());

                coin.classList.remove('flipping');
            });
    }, 1500);
}

function resetGame() {
    scorePlayer1 = 0;
    scorePlayer2 = 0;
    gameOver = false;

    document.getElementById('score1').textContent = 0;
    document.getElementById('score2').textContent = 0;
    document.getElementById('resultText').textContent = "Ready?";
    document.getElementById('statusText').textContent = "Best of 3 (first to 2 wins)";
    document.getElementById('coin').textContent = "TOSS";
    document.getElementById('tossBtn').disabled = false;
}

function createGame() {
    fetch('/create_game')
        .then(res => res.json())
        .then(data => {
            gameCode = data.code;
            document.getElementById('gameCodeDisplay').innerText = "Game Code: " + gameCode;

            const url = window.location.origin + "?code=" + gameCode;

            document.getElementById('whatsappShare').href =
                "https://wa.me/?text=Join my game: " + url;

            document.getElementById('smsShare').href =
                "sms:?body=Join my game: " + url;

            document.getElementById('emailShare').href =
                "mailto:?subject=Join Game&body=" + url;

            document.getElementById('shareLinks').style.display = 'block';
        });
}

function joinGame() {
    const code = document.getElementById('gameCodeInput').value;

    fetch('/join_game?code=' + code)
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                alert(data.error);
            } else {
                gameCode = code;
                alert("Joined game!");
            }
        });
}

player1Input.addEventListener('input', syncNames);
player2Input.addEventListener('input', syncNames);

syncNames();
</script>

</body>
</html>
