<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Coin Toss Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
:root {
  --bg:        #090e1a;
  --bg2:       #111827;
  --bg3:       #1a2235;
  --gold:      #f0c040;
  --gold2:     #ffd700;
  --gold-dim:  #9a7a10;
  --gold-glow: rgba(240,192,64,0.22);
  --teal:      #22d3c8;
  --teal-glow: rgba(34,211,200,0.18);
  --red:       #f05060;
  --green:     #22d37a;
  --text:      #dce8f8;
  --sub:       #8898b8;
  --border:    rgba(255,255,255,0.08);
  --r:         22px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 14px 80px;
  position:relative;
  overflow-x:hidden;
}
/* Subtle grid texture */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    radial-gradient(ellipse 70% 45% at 15% 5%,  rgba(240,192,64,.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 55% at 88% 95%, rgba(34,211,200,.06) 0%, transparent 55%),
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size:auto,auto,40px 40px,40px 40px;
  pointer-events:none;z-index:0;
}
body>*{position:relative;z-index:1}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.hdr{text-align:center;margin-bottom:22px;width:100%;max-width:500px}
.hdr-logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:2px}
.hdr-coin{
  width:42px;height:42px;border-radius:50%;
  background:radial-gradient(circle at 32% 28%,#fff7c0,var(--gold) 52%,#8a5c00);
  box-shadow:0 0 18px var(--gold-glow),inset 0 2px 4px rgba(255,255,255,.35);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  animation:hdrFloat 3.5s ease-in-out infinite;
}
@keyframes hdrFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.hdr h1{
  font-family:'Teko',sans-serif;
  font-size:clamp(34px,7vw,54px);font-weight:700;letter-spacing:2px;
  background:linear-gradient(120deg,var(--gold2) 15%,var(--gold) 45%,var(--teal) 85%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;
}
.hdr p{font-size:13px;color:var(--sub);margin-top:3px;letter-spacing:.3px}

/* ═══════════════════════════════════════════
   CARD
═══════════════════════════════════════════ */
.card{
  width:100%;max-width:500px;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:24px 20px;
  position:relative;overflow:hidden;
}
.card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,rgba(240,192,64,.25) 50%,transparent 95%);
}

/* ═══════════════════════════════════════════
   FORM ELEMENTS
═══════════════════════════════════════════ */
.lbl{
  display:block;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:1.5px;
  color:var(--sub);margin-bottom:7px;
}
input[type=text]{
  width:100%;
  background:rgba(255,255,255,.05);
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:13px 15px;
  color:var(--text);
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
input[type=text]:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(240,192,64,.13)}
input[type=text]::placeholder{color:var(--sub);font-weight:400}

/* ═══════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  border:none;border-radius:50px;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;
  letter-spacing:.2px;white-space:nowrap;
  transition:transform .12s,box-shadow .18s,opacity .18s;
}
.btn:active:not(:disabled){transform:scale(.95)}
.btn:disabled{opacity:.32;cursor:not-allowed;transform:none!important}

.btn-gold{
  background:linear-gradient(135deg,var(--gold2),#e8960a);
  color:#1a0800;
  box-shadow:0 4px 22px rgba(240,192,64,.38);
  padding:14px 22px;
}
.btn-gold:hover:not(:disabled){box-shadow:0 6px 30px rgba(240,192,64,.58);transform:translateY(-1px)}

.btn-teal{
  background:linear-gradient(135deg,var(--teal),#0ab0a8);
  color:#001614;
  box-shadow:0 4px 18px rgba(34,211,200,.32);
  padding:14px 22px;
}
.btn-teal:hover:not(:disabled){box-shadow:0 6px 26px rgba(34,211,200,.5);transform:translateY(-1px)}

.btn-ghost{
  background:rgba(255,255,255,.06);
  color:var(--text);border:1.5px solid var(--border);
  padding:13px 18px;
}
.btn-ghost:hover:not(:disabled){background:rgba(255,255,255,.1)}
.btn-w{width:100%}

.or-sep{
  display:flex;align-items:center;gap:10px;
  margin:18px 0;color:var(--sub);
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
}
.or-sep::before,.or-sep::after{content:'';flex:1;height:1px;background:var(--border)}

/* ═══════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════ */
.screen{display:none}
.screen.on{display:block}

/* ─── LOBBY ─── */
.lobby{text-align:center;padding:8px 0 16px}
.lobby-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--sub);margin-bottom:6px}
.lobby-code{
  font-family:'Teko',sans-serif;font-size:62px;font-weight:700;
  letter-spacing:10px;color:var(--gold);
  text-shadow:0 0 28px var(--gold-glow);line-height:1;
  cursor:pointer;user-select:all;
  transition:text-shadow .2s;
}
.lobby-code:hover{text-shadow:0 0 40px rgba(240,192,64,.5)}
.lobby-hint{font-size:13px;color:var(--sub);margin:8px 0 20px}

/* Share icons — icon-only bubbles */
.share-row{display:flex;gap:14px;justify-content:center;margin-bottom:22px}
.si{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;text-decoration:none;
  transition:transform .15s,box-shadow .15s;flex-shrink:0;
}
.si:hover{transform:scale(1.12)}
.si svg{display:block;pointer-events:none}
.si-wa  {background:#25d366;box-shadow:0 4px 16px rgba(37,211,102,.4)}
.si-sms {background:#4a8ef0;box-shadow:0 4px 16px rgba(74,142,240,.4)}
.si-mail{background:#ea4335;box-shadow:0 4px 16px rgba(234,67,53,.4)}
.si-copy{background:var(--bg3);border:1.5px solid var(--border);box-shadow:none}
.si-copy:hover{background:#222e45}

/* Waiting dots */
.wait-row{
  display:flex;align-items:center;justify-content:center;
  gap:10px;font-size:13px;color:var(--sub);
}
.dots{display:flex;gap:5px}
.dots span{
  width:7px;height:7px;border-radius:50%;background:var(--teal);
  animation:dotB 1.3s ease-in-out infinite;
}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes dotB{0%,80%,100%{transform:scale(.65);opacity:.35}40%{transform:scale(1.1);opacity:1}}

/* ═══════════════════════════════════════════
   ARENA
═══════════════════════════════════════════ */
#arena{display:none}

/* ── Game-over banner ── */
.go-banner{
  display:none;
  text-align:center;padding:16px 14px 14px;
  background:linear-gradient(135deg,rgba(240,192,64,.1),rgba(34,211,200,.07));
  border:1px solid rgba(240,192,64,.3);border-radius:16px;
  margin-bottom:18px;
  animation:banIn .45s cubic-bezier(.36,1.56,.64,1);
}
@keyframes banIn{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
.go-title{
  font-family:'Teko',sans-serif;font-size:40px;font-weight:700;
  color:var(--gold);letter-spacing:1px;line-height:1;
}
.go-sub{font-size:13px;color:var(--sub);margin-top:5px}

/* ── Player panels + arrows ── */
.arena-top{
  display:grid;
  grid-template-columns:1fr 36px 1fr;
  gap:8px;align-items:center;
  margin-bottom:16px;
}
.pp{
  background:var(--bg3);
  border:2px solid var(--border);
  border-radius:18px;padding:14px 10px 12px;
  text-align:center;position:relative;
  transition:border-color .3s,box-shadow .3s,background .3s;
  overflow:hidden;min-width:0;
}
/* glow top line */
.pp::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(240,192,64,0),transparent);
  transition:background .3s;
}
.pp.active{
  border-color:var(--gold);
  background:rgba(240,192,64,.07);
  box-shadow:0 0 26px rgba(240,192,64,.2);
}
.pp.active::before{
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.pp.win-flash{animation:wFlash .55s ease 2}
@keyframes wFlash{
  0%,100%{background:var(--bg3)}
  50%{background:rgba(34,211,200,.14);border-color:var(--teal)}
}

/* Avatar */
.av{
  width:44px;height:44px;border-radius:50%;
  margin:0 auto 8px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:800;color:#1a0800;
  background:linear-gradient(135deg,var(--gold2),#e08000);
  flex-shrink:0;position:relative;z-index:1;
}
.av.p2{background:linear-gradient(135deg,var(--teal),#0070d0);color:#001614}

/* Active player crown */
.pp.active .av::after{
  content:'👑';
  position:absolute;top:-14px;left:50%;
  transform:translateX(-50%);
  font-size:14px;
  animation:crownBob .8s ease-in-out infinite;
}
@keyframes crownBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-3px)}}

.pp-name{
  font-size:13px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:5px;
}
.pp-score{
  font-family:'Teko',sans-serif;font-size:54px;font-weight:700;
  line-height:1;color:var(--text);
}
.pp-score.pop{animation:sPop .42s cubic-bezier(.36,1.56,.64,1)}
@keyframes sPop{
  0%{transform:scale(1)}
  50%{transform:scale(1.38);color:var(--gold)}
  100%{transform:scale(1)}
}
.you-tag{
  display:inline-block;
  background:var(--teal);color:#001614;
  font-size:9px;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;padding:2px 8px;
  border-radius:20px;margin-top:3px;
}

/* VS + Arrow column */
.vs-col{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;
}
.vs-txt{
  font-family:'Teko',sans-serif;font-size:20px;font-weight:600;
  color:var(--sub);line-height:1;
}
/* Animated arrow pointing at active player */
.arr{
  width:0;height:0;opacity:0;
  transition:opacity .3s,transform .3s;
}
.arr-up{
  border-left:9px solid transparent;border-right:9px solid transparent;
  border-bottom:13px solid var(--gold);transform:translateY(6px);
}
.arr-dn{
  border-left:9px solid transparent;border-right:9px solid transparent;
  border-top:13px solid var(--gold);transform:translateY(-6px);
}
.arr.show{opacity:1;transform:translateY(0)!important}
/* pulse the arrow */
.arr.show{animation:arrPulse 1s ease-in-out infinite}
@keyframes arrPulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Coin ── */
.coin-sec{display:flex;flex-direction:column;align-items:center;margin:4px 0 16px}
.coin-halo{
  position:relative;width:152px;height:152px;
}
.coin-ring{
  position:absolute;inset:-10px;border-radius:50%;
  border:2px solid transparent;
  background:conic-gradient(var(--gold),var(--teal),var(--gold)) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;mask-composite:exclude;
  opacity:0;transition:opacity .3s;
  animation:ringRot 3s linear infinite;
}
@keyframes ringRot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.coin-halo.myturn .coin-ring{opacity:.85}

.coin{
  width:152px;height:152px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Teko',sans-serif;font-size:26px;font-weight:700;letter-spacing:2px;
  background:radial-gradient(circle at 30% 25%,#fff8b0,var(--gold) 50%,#9a6200 80%,#3d1e00);
  box-shadow:
    0 12px 40px rgba(0,0,0,.6),
    inset 0 3px 7px rgba(255,255,255,.3),
    0 0 0 5px rgba(240,192,64,.1);
  color:#3d2400;
  position:relative;z-index:1;
  transform-style:preserve-3d;
}
.coin.flip{animation:cFlip 1.6s cubic-bezier(.4,0,.2,1) forwards}
@keyframes cFlip{
  0%  {transform:rotateY(0)      scale(1)}
  18% {transform:rotateY(540deg)  scale(1.09)}
  42% {transform:rotateY(1080deg) scale(1.13)}
  66% {transform:rotateY(1620deg) scale(1.07)}
  86% {transform:rotateY(2040deg) scale(1.02)}
  100%{transform:rotateY(2160deg) scale(1)}
}

/* Coin result badge after toss */
.coin-badge{
  margin-top:10px;
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(240,192,64,.12);
  border:1px solid rgba(240,192,64,.25);
  border-radius:20px;padding:5px 14px;
  font-size:13px;font-weight:700;color:var(--gold);
  min-height:30px;
}

/* ── Status ── */
.status-sec{text-align:center;margin-bottom:16px}
.round-msg{font-size:17px;font-weight:800;min-height:25px;letter-spacing:.1px}
.turn-pill{
  display:inline-flex;align-items:center;gap:7px;
  margin-top:9px;padding:7px 18px;border-radius:50px;
  font-size:13px;font-weight:700;
  transition:background .3s,color .3s,border-color .3s;
}
.turn-pill.mine{
  background:rgba(240,192,64,.14);
  border:1px solid rgba(240,192,64,.4);
  color:var(--gold);
}
.turn-pill.theirs{
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  color:var(--sub);
}
.pip{width:7px;height:7px;border-radius:50%;background:currentColor}
.turn-pill.mine .pip{animation:pipP 1s ease-in-out infinite}
@keyframes pipP{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.55)}}
.match-hint{font-size:12px;color:var(--sub);margin-top:5px}

/* ── Action row ── */
.act-row{display:flex;gap:10px}
#tossBtn{
  flex:1;font-size:16px;padding:15px 20px;position:relative;overflow:hidden;
}
/* shimmer on my-turn only */
#tossBtn.mine::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.18) 50%,transparent 100%);
  transform:translateX(-100%);
  animation:shim 1.8s ease-in-out infinite;pointer-events:none;
}
@keyframes shim{0%{transform:translateX(-120%)}100%{transform:translateX(120%)}}

.reset-btn{flex:0 0 auto;padding:15px 16px}

/* Room label */
.room-lbl{
  text-align:center;margin-top:14px;
  font-size:12px;color:var(--sub);
}
.room-lbl b{
  color:var(--teal);
  font-family:'Teko',sans-serif;font-size:16px;letter-spacing:2px;
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
#toast{
  position:fixed;top:14px;left:50%;
  transform:translateX(-50%) translateY(-110px);
  background:#182030;
  border:1px solid var(--border);
  border-radius:12px;padding:10px 20px;
  font-size:13px;font-weight:700;z-index:9999;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
  max-width:88vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#toast.on{transform:translateX(-50%) translateY(0)}
#toast.err {border-color:var(--red);  color:var(--red)}
#toast.ok  {border-color:var(--green);color:var(--green)}
#toast.inf {border-color:var(--teal); color:var(--teal)}
#toast.wrn {border-color:var(--gold); color:var(--gold)}

/* ═══════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════ */
.pgfoot{position:fixed;bottom:12px;right:15px;font-size:11px;color:var(--sub)}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media(max-width:400px){
  .coin-halo,.coin{width:132px;height:132px}
  .pp-score{font-size:46px}
  .lobby-code{font-size:46px;letter-spacing:7px}
  .go-title{font-size:34px}
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-logo">
    <div class="hdr-coin">🪙</div>
    <h1>Coin Toss Arena</h1>
  </div>
  <p>Real-time 2-player · Best of 3</p>
</div>

<!-- ════════════════════════
     SETUP CARD
════════════════════════ -->
<div class="card" id="setupCard">

  <!-- Home screen -->
  <div class="screen on" id="sHome">
    <label class="lbl" for="myName">Your Name</label>
    <input type="text" id="myName" placeholder="Enter your name"
           maxlength="20" autocomplete="off" style="margin-bottom:18px"/>

    <button class="btn btn-gold btn-w" onclick="doCreate()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
      Create New Game
    </button>

    <div class="or-sep">or join existing</div>

    <label class="lbl" for="joinCode">Game Code</label>
    <div style="display:flex;gap:9px">
      <input type="text" id="joinCode" placeholder="e.g. AB3X9K"
             maxlength="6" autocomplete="off"
             style="text-transform:uppercase;letter-spacing:5px;font-family:'Teko',sans-serif;font-size:24px;font-weight:600"
             onkeydown="if(event.key==='Enter')doJoin()"/>
      <button class="btn btn-teal" style="flex:0 0 auto;padding:13px 20px" onclick="doJoin()">Join</button>
    </div>
  </div>

  <!-- Lobby screen -->
  <div class="screen" id="sLobby">
    <div class="lobby">
      <div class="lobby-lbl">Game Code</div>
      <div class="lobby-code" id="lobbyCode" title="Tap to copy" onclick="copyLink()">------</div>
      <div class="lobby-hint">Share this code with your opponent</div>

      <!-- Icon-only share buttons -->
      <div class="share-row">
        <!-- WhatsApp -->
        <a class="si si-wa" id="waLink" target="_blank" rel="noopener" title="Share on WhatsApp">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a8.3 8.3 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.943-1.42A9.955 9.955 0 0 0 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/>
          </svg>
        </a>
        <!-- SMS -->
        <a class="si si-sms" id="smsLink" title="Share via SMS">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h10v2H7zm0-3h10v2H7zm0 6h7v2H7z"/>
          </svg>
        </a>
        <!-- Email -->
        <a class="si si-mail" id="mailLink" title="Share via Email">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/>
          </svg>
        </a>
        <!-- Copy link -->
        <button class="si si-copy" onclick="copyLink()" title="Copy invite link">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--text)">
            <path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/>
          </svg>
        </button>
      </div>

      <div class="wait-row">
        <div class="dots"><span></span><span></span><span></span></div>
        Waiting for opponent to join…
      </div>
    </div>
  </div>

</div><!-- /setupCard -->

<!-- ════════════════════════
     GAME ARENA
════════════════════════ -->
<div class="card" id="arena">

  <!-- Game-over banner -->
  <div class="go-banner" id="goBanner">
    <div class="go-title" id="goTitle">🏆 Winner!</div>
    <div class="go-sub"  id="goSub"></div>
  </div>

  <!-- Player panels -->
  <div class="arena-top">
    <!-- P1 -->
    <div class="pp" id="pp0">
      <div class="av" id="av0">?</div>
      <div class="pp-name" id="pn0">Player 1</div>
      <div class="pp-score" id="ps0">0</div>
      <div id="yt0"></div>
    </div>

    <!-- VS + arrows pointing at whose turn -->
    <div class="vs-col">
      <div class="arr arr-up" id="arrUp"></div><!-- points down = P1's turn when shown top -->
      <div class="vs-txt">VS</div>
      <div class="arr arr-dn" id="arrDn"></div><!-- points up = P2's turn when shown bottom -->
    </div>

    <!-- P2 -->
    <div class="pp" id="pp1">
      <div class="av p2" id="av1">?</div>
      <div class="pp-name" id="pn1">Player 2</div>
      <div class="pp-score" id="ps1">0</div>
      <div id="yt1"></div>
    </div>
  </div>

  <!-- Coin -->
  <div class="coin-sec">
    <div class="coin-halo" id="coinHalo">
      <div class="coin-ring"></div>
      <div class="coin" id="coin">TOSS</div>
    </div>
    <div class="coin-badge" id="coinBadge">&nbsp;</div>
  </div>

  <!-- Status -->
  <div class="status-sec">
    <div class="round-msg" id="roundMsg">Get Ready!</div>
    <div class="turn-pill theirs" id="turnPill">
      <span class="pip"></span>
      <span id="turnTxt">Waiting for players…</span>
    </div>
    <div class="match-hint">First to 2 wins the match</div>
  </div>

  <!-- Buttons -->
  <div class="act-row">
    <button class="btn btn-gold" id="tossBtn" onclick="doToss()" disabled>
      🪙 Toss the Coin
    </button>
    <button class="btn btn-ghost reset-btn" onclick="doReset()" title="Reset match">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4C7.58 4 4 7.58 4 12s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
      </svg>
    </button>
  </div>

  <div class="room-lbl">Room: <b id="roomLbl">------</b></div>

</div><!-- /arena -->

<div class="pgfoot">Developed by Amjad</div>

<!-- ════════════════════════
     JAVASCRIPT
════════════════════════ -->
<script>
/* ─── State ─────────────────────────────────────── */
let sock       = null;
let myCode     = null;
let myIdx      = -1;      // 0 or 1 — which player am I?
let whoseTurn  = 0;
let over       = false;
let locked     = false;   // prevent double-toss client-side too
let names      = ['Player 1','Player 2'];

/* ─── Toast ─────────────────────────────────────── */
let _tt;
function toast(msg, type='inf'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='on '+type;
  clearTimeout(_tt);
  _tt=setTimeout(()=>{el.className=''},3600);
}

/* ─── Socket ────────────────────────────────────── */
function initSock(){
  if(sock && sock.connected) return;

  sock = io({
    reconnection:true,
    reconnectionAttempts:6,
    reconnectionDelay:1200,
  });

  sock.on('connect',()=>{
    // Re-announce if we were mid-game
    if(myCode && myIdx>=0){
      sock.emit('join_game',{code:myCode,name:names[myIdx]});
    }
  });

  sock.on('connect_error',()=>toast('Connection issue — retrying…','wrn'));

  sock.on('error', d=>toast(d.msg,'err'));

  sock.on('joined', d=>{
    myIdx  = d.your_index;
    myCode = d.code;
    // Badge is added when arena shows; safe to call here too for reconnects
    if(document.getElementById('arena').style.display==='block') setYouTag(myIdx);
  });

  sock.on('state_sync', d=>{
    names = d.names;
    // If already in arena, refresh names
    if(document.getElementById('arena').style.display==='block'){
      refreshNames();
    }
  });

  sock.on('game_start', d=>{
    names     = d.names;
    whoseTurn = d.whose_turn;
    over      = false;
    locked    = false;
    showArena();
    refreshNames();
    setYouTag(myIdx);
    updateTurnUI();
    toast('Game on! 🎮','ok');
  });

  sock.on('toss_result', d=>{
    // Animate coin
    const coin=document.getElementById('coin');
    coin.classList.remove('flip');
    void coin.offsetWidth;
    coin.classList.add('flip');

    names     = d.names;
    whoseTurn = d.whose_turn;
    over      = d.game_over;

    setTimeout(()=>{
      // Coin face text
      coin.textContent = d.coin_face.toUpperCase();

      // Coin badge (shows face result)
      const badge=document.getElementById('coinBadge');
      badge.textContent = `${d.coin_face} • ${d.round_winner_name} wins round`;

      // Animate winner score
      const ws=document.getElementById('ps'+d.winner_index);
      ws.textContent = d.scores[d.winner_index];
      ws.classList.remove('pop'); void ws.offsetWidth; ws.classList.add('pop');

      // Update other score
      const other=1-d.winner_index;
      document.getElementById('ps'+other).textContent = d.scores[other];

      // Flash winner panel
      const wp=document.getElementById('pp'+d.winner_index);
      wp.classList.add('win-flash');
      setTimeout(()=>wp.classList.remove('win-flash'),1200);

      document.getElementById('roundMsg').textContent=
        `${d.round_winner_name} wins this round! 🎯`;

      locked=false;

      if(d.game_over){
        showGameOver(d.winner_name, d.scores);
      } else {
        updateTurnUI();
      }
    },1620);
  });

  sock.on('game_reset', d=>{
    names     = d.names;
    whoseTurn = d.whose_turn;
    over      = false;
    locked    = false;

    const coin=document.getElementById('coin');
    coin.classList.remove('flip');
    coin.textContent='TOSS';

    document.getElementById('ps0').textContent='0';
    document.getElementById('ps1').textContent='0';
    document.getElementById('roundMsg').textContent='New round — Go!';
    document.getElementById('coinBadge').innerHTML='&nbsp;';
    document.getElementById('goBanner').style.display='none';

    refreshNames();
    updateTurnUI();
    toast('Match reset! New game.','inf');
  });

  sock.on('player_left', d=>{
    toast(`${d.name} disconnected 😢`,'err');
    document.getElementById('tossBtn').disabled=true;
    document.getElementById('tossBtn').classList.remove('mine');
    document.getElementById('coinHalo').classList.remove('myturn');
    document.getElementById('turnPill').className='turn-pill theirs';
    document.getElementById('turnTxt').textContent='Opponent disconnected';
    clearArrows();
    document.getElementById('pp0').classList.remove('active');
    document.getElementById('pp1').classList.remove('active');
  });
}

/* ─── Setup actions ─────────────────────────────── */
function myName(){ return document.getElementById('myName').value.trim()||'Player' }

function doCreate(){
  initSock();
  fetch('/create_game')
    .then(r=>r.json())
    .then(d=>{
      myCode=d.code;
      sock.emit('join_game',{code:myCode,name:myName()});

      // Populate lobby
      document.getElementById('lobbyCode').textContent=myCode;
      const url=location.origin+'?code='+myCode;
      const msg=encodeURIComponent(`Join my Coin Toss Arena! Code: ${myCode} → ${url}`);
      document.getElementById('waLink').href  =`https://wa.me/?text=${msg}`;
      document.getElementById('smsLink').href =`sms:?body=${msg}`;
      document.getElementById('mailLink').href=`mailto:?subject=Join+my+Coin+Toss+game&body=${msg}`;

      switchScreen('sLobby');
    })
    .catch(()=>toast('Could not create game. Try again.','err'));
}

function doJoin(){
  const code=document.getElementById('joinCode').value.trim().toUpperCase();
  if(code.length<4){ toast('Enter a valid game code.','err'); return; }
  initSock();
  myCode=code;
  sock.emit('join_game',{code,name:myName()});
}

function copyLink(){
  if(!myCode) return;
  const url=location.origin+'?code='+myCode;
  navigator.clipboard.writeText(url)
    .then(()=>toast('Invite link copied!','ok'))
    .catch(()=>toast('Copy failed — share the code manually.','wrn'));
}

/* ─── Game actions ──────────────────────────────── */
function doToss(){
  if(!sock||!myCode||over||locked) return;
  if(myIdx!==whoseTurn){ toast("Hold on — it's your opponent's turn!",'wrn'); return; }
  locked=true;
  document.getElementById('tossBtn').disabled=true;
  sock.emit('toss',{code:myCode});
}

function doReset(){
  if(!sock||!myCode) return;
  sock.emit('reset_game',{code:myCode});
}

/* ─── UI helpers ────────────────────────────────── */
function switchScreen(id){
  document.querySelectorAll('#setupCard .screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function showArena(){
  document.getElementById('setupCard').style.display='none';
  document.getElementById('arena').style.display='block';
  document.getElementById('roomLbl').textContent=myCode;
}

function refreshNames(){
  ['0','1'].forEach(i=>{
    document.getElementById('pn'+i).textContent=names[i];
    const av=document.getElementById('av'+i);
    av.textContent=names[i].charAt(0).toUpperCase();
  });
}

function setYouTag(idx){
  ['0','1'].forEach(i=>{ document.getElementById('yt'+i).innerHTML=''; });
  if(idx<0) return;
  const el=document.createElement('div');
  el.className='you-tag';el.textContent='YOU';
  document.getElementById('yt'+idx).appendChild(el);
}

/* Core turn UI — called after every state change */
function updateTurnUI(){
  const isMe = (myIdx===whoseTurn) && !over;

  /* Toss button */
  const btn=document.getElementById('tossBtn');
  btn.disabled=!isMe;
  btn.classList.toggle('mine',isMe);

  /* Coin halo ring */
  document.getElementById('coinHalo').classList.toggle('myturn',isMe);

  /* Player panel active glow */
  document.getElementById('pp0').classList.toggle('active',whoseTurn===0 && !over);
  document.getElementById('pp1').classList.toggle('active',whoseTurn===1 && !over);

  /* Turn pill */
  const pill=document.getElementById('turnPill');
  const txt =document.getElementById('turnTxt');
  if(over){
    pill.className='turn-pill theirs';
    txt.textContent='Match complete!';
  } else if(isMe){
    pill.className='turn-pill mine';
    txt.textContent='🎯 Your turn — tap Toss!';
  } else {
    pill.className='turn-pill theirs';
    txt.textContent=`⏳ ${names[whoseTurn]}'s turn…`;
  }

  /* Arrow: point toward active player */
  updateArrows();
}

function updateArrows(){
  const up=document.getElementById('arrUp');
  const dn=document.getElementById('arrDn');
  up.classList.remove('show');
  dn.classList.remove('show');
  if(over) return;
  /* arrUp (▼ visually) points DOWN toward P1 panel (left side on mobile, top in grid) */
  /* arrDn (▲ visually) points UP toward P2 panel                                     */
  if(whoseTurn===0) up.classList.add('show');   // top arrow lights for P1
  else              dn.classList.add('show');   // bottom arrow lights for P2
}

function clearArrows(){
  document.getElementById('arrUp').classList.remove('show');
  document.getElementById('arrDn').classList.remove('show');
}

function showGameOver(winnerName, scores){
  over=true; locked=false;
  document.getElementById('tossBtn').disabled=true;
  document.getElementById('tossBtn').classList.remove('mine');
  document.getElementById('coinHalo').classList.remove('myturn');
  document.getElementById('pp0').classList.remove('active');
  document.getElementById('pp1').classList.remove('active');
  clearArrows();

  const banner=document.getElementById('goBanner');
  banner.style.display='block';
  document.getElementById('goTitle').textContent=`🏆 ${winnerName} Wins!`;
  document.getElementById('goSub').textContent=
    `Final score: ${scores[0]} – ${scores[1]}`;
  document.getElementById('turnPill').className='turn-pill theirs';
  document.getElementById('turnTxt').textContent='Match complete!';

  /* Confetti burst for the local winner */
  if(myIdx>=0 && winnerName===names[myIdx]){
    confetti({particleCount:200,spread:120,origin:{y:.5}});
    setTimeout(()=>confetti({particleCount:90,spread:55,angle:60, origin:{x:0,y:.6}}),380);
    setTimeout(()=>confetti({particleCount:90,spread:55,angle:120,origin:{x:1,y:.6}}),660);
  }
}

/* ─── Auto-fill code from URL ───────────────────── */
addEventListener('DOMContentLoaded',()=>{
  const code=new URLSearchParams(location.search).get('code');
  if(code){
    document.getElementById('joinCode').value=code.toUpperCase();
    toast(`Code ${code.toUpperCase()} ready — enter your name then Join!`,'inf');
  }
});
</script>
</body>
</html>
